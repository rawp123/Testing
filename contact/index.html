<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact | Robert Parrish</title>
  <meta name="description" content="Send a message to Robert Parrish." />
  <link rel="stylesheet" href="/style.css">
  <script src="/src/js/header.js" defer></script>
</head>
<body data-page="contact">
  <div id="site-header"></div>
  <main>
    <section class="container page-shell">
      <section class="card page-shell-card">
        <div class="page-shell-head">
          <div class="page-shell-copy">
            <p class="page-kicker">Contact</p>
            <h1 class="page-title">Send a message</h1>
            <p class="page-subtitle">Send a note and I&rsquo;ll get back to you.</p>
          </div>
        </div>
        <!-- Replace the action URL below with your Formspree endpoint after signup -->
        <form action="https://formspree.io/f/xaqdjgde" method="POST">
          <input type="hidden" name="_redirect" value="/thank-you/">
          <label>
            Email
            <input type="email" name="email" required>
          </label>
          <label>
            Message
            <textarea name="message" rows="4" required></textarea>
          </label>
          <div class="form-actions">
            <button type="submit" class="btn primary">Send message</button>
          </div>
        </form>
        <div class="muted small">This form is handled securely through Formspree.</div>
      </section>
    </section>
  </main>
  <footer class="site-footer container">
    <div>&copy; Robert Parrish. All rights reserved.</div>
    <div class="muted small">Built with HTML, CSS, and JavaScript.</div>
  </footer>
</body>
</html>
